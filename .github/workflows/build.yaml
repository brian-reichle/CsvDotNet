name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    types: [ opened, synchronize ]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    name: Build ${{ matrix.configuration }}

    strategy:
      matrix:
        os: [ windows-latest ]
        configuration: [ Debug, Release ]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
    - name: Build
      run: dotnet build src --configuration ${{ matrix.configuration }}
    - name: Run Tests
      if: matrix.configuration == 'Debug'
      run: dotnet test src --no-build
    - name: Build Package
      if: matrix.configuration == 'Release'
      run: dotnet pack src/CsvDotNet --no-build --configuration ${{ matrix.configuration }} -p:RepositoryCommit=${{ github.sha }} -p:RepositoryBranch=${{ github.ref }}
    - name: Save Artifacts
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: |
          artifacts\package\${{ matrix.configuration }}\*.nupkg
          artifacts\package\${{ matrix.configuration }}\*.snupkg
        if-no-files-found: error

